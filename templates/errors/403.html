{% extends "base.html" %}
{% block title %}403 – Access Denied{% endblock %}

{% block body %}
<div class="error-page">
  <div class="error-box">
    <div class="error-code">403</div>
    <div class="error-icon">🔒</div>
    <h1>Access Denied</h1>
    <p>You do not have permission to view this page. Please log in with the appropriate account, or contact your administrator.</p>
    <div class="error-actions">
      <a href="{{ url_for('login') }}" class="btn btn-primary">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
