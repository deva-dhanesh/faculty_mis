{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}

{% block body %}
<div class="error-page">
  <div class="error-box">
    <div class="error-code">404</div>
    <div class="error-icon">🔍</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Check the URL and try again.</p>
    <div class="error-actions">
      <a href="{{ url_for('login') }}" class="btn btn-primary">Go Home</a>
    </div>
  </div>
</div>
{% endblock %}
