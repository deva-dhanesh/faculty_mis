{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}

{% block body %}
<div class="error-page">
  <div class="error-box">
    <div class="error-code">500</div>
    <div class="error-icon">⚠️</div>
    <h1>Internal Server Error</h1>
    <p>Something went wrong on our end. Please try again in a moment, or contact your administrator if the problem persists.</p>
    <div class="error-actions">
      <a href="{{ url_for('login') }}" class="btn btn-primary">Go Home</a>
    </div>
  </div>
</div>
{% endblock %}
