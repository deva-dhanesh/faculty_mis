{% extends "layouts/faculty_base.html" %}
{% block title %}Edit Course Attended{% endblock %}

{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h1>Edit Course Attended</h1>
    <p>Update the details of this course.</p>
  </div>
  <div class="page-header-actions">
    <a href="{{ url_for('my_courses') }}" class="btn btn-ghost">← Value Added Programs</a>
  </div>
</div>

<div class="form-card" style="max-width:860px;">
  <div class="form-card-header">
    <h2>Course Attended Details</h2>
  </div>
  <div class="form-card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div class="form-group">
        <label class="form-label" for="course_name">
          Name of the Certificate / Value-Added Course <span style="color:red;">*</span>
        </label>
        <input class="form-input" type="text" id="course_name" name="course_name"
               value="{{ entry.course_name }}" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="online_course_name">
          Name of the Online Course &amp; Platform
          <span class="form-hint">(Coursera, LinkedIn, MOOCs, e-Pathshala, NPTEL, SWAYAM, etc.)</span>
        </label>
        <input class="form-input" type="text" id="online_course_name" name="online_course_name"
               value="{{ entry.online_course_name or '' }}"/>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="date_from">Date of Course From</label>
          <input class="form-input" type="date" id="date_from" name="date_from"
                 value="{{ entry.date_from.strftime('%Y-%m-%d') if entry.date_from else '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="date_to">Date of Course To</label>
          <input class="form-input" type="date" id="date_to" name="date_to"
                 value="{{ entry.date_to.strftime('%Y-%m-%d') if entry.date_to else '' }}"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="mode">Mode of Course</label>
        <input class="form-input" type="text" id="mode" name="mode"
               value="{{ entry.mode or '' }}" placeholder="e.g. Online — NPTEL"/>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="contact_hours">Total Contact Hours</label>
          <input class="form-input" type="number" id="contact_hours" name="contact_hours"
                 value="{{ entry.contact_hours if entry.contact_hours is not none else '' }}"
                 min="0" step="0.5"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="offered_by">Course Offered By</label>
          <input class="form-input" type="text" id="offered_by" name="offered_by"
                 value="{{ entry.offered_by or '' }}"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="certificate_link">Link to Sample Certificate</label>
        <input class="form-input" type="url" id="certificate_link" name="certificate_link"
               value="{{ entry.certificate_link or '' }}" placeholder="https://..."/>
      </div>

      <div style="display:flex;gap:12px;margin-top:24px;">
        <button type="submit" class="btn btn-primary">Update Course</button>
        <a href="{{ url_for('my_courses') }}" class="btn btn-ghost">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
